<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoNetra - Profile</title>
  <link rel="stylesheet" href="../CSS/style.css">
  <link rel="stylesheet" href="../CSS/hazard.css">
  <link rel="stylesheet" href="../CSS/profile.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
  <script type="module" src="../script.js"></script>
</head>

<body data-page="profile">
  <div class="app-container">
    <aside class="sidebar" aria-label="Primary"></aside>

    <main class="main-wrapper">
      <header class="top-header">
        <div>
          <div class="header-title">My Profile</div>
          <div class="header-subtitle">Manage your preferences and notification settings</div>
        </div>
        <div class="header-actions">
          <button class="notification-btn" title="Notifications" type="button">
            <span class="badge">3</span>
            <i data-lucide="bell"></i>
          </button>
          <a href="profile.html" class="user-profile">
            <div class="avatar">U</div>
            <div>
              <div class="profile-name">User</div>
              <span class="profile-role">Observer</span>
            </div>
          </a>
        </div>
      </header>

      <div class="profile-bg">
        <section class="content-area">
          <h2 class="section-title">Profile Settings</h2>

          <article class="glass-card form-card profile-card">
            <div class="profile-hero">
              <div class="avatar">U</div>
              <div>
                <h3>Observer User</h3>
                <p>guest@geonetra.network</p>
              </div>
            </div>

            <form class="report-form" action="javascript:void(0);" onsubmit="alert('Settings saved successfully!');">
              <div class="form-group">
                <label for="display-name" class="form-label">Display Name</label>
                <input type="text" id="display-name" class="form-input" value="Observer User">
              </div>

              <div class="form-group">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" value="guest@geonetra.network">
              </div>

              <div class="form-group">
                <label for="alerts" class="form-label">Alert Preferences</label>
                <select id="alerts" class="form-input">
                  <option>All critical alerts</option>
                  <option>High severity only</option>
                  <option>Do not disturb</option>
                </select>
              </div>

              <button type="submit" class="submit-btn">Save Settings</button>
            </form>
          </article>
        </section>
      </div>
    </main>
  </div>
</body>

</html>
